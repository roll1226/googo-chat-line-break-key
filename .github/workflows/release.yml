name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Generate icons
        run: npm run generate-icons

      - name: Create extension ZIP
        run: |
          zip -r googo-chat-line-break-key-${{ github.ref_name }}.zip \
            manifest.json \
            src/ \
            icons/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: googo-chat-line-break-key-${{ github.ref_name }}.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
