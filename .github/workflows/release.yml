name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag name (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Generate icons
        run: npm run generate-icons

      - name: Set release tag
        id: tag
        env:
          TAG_INPUT: ${{ github.event.inputs.tag_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Strip carriage returns, newlines, and any characters not valid in a
            # tag name, then enforce the expected vX.Y.Z format.
            SANITIZED=$(printf '%s' "${TAG_INPUT}" | tr -d '\r\n' | tr -cd '[:alnum:]._+-')
            if ! printf '%s' "${SANITIZED}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "::error::Invalid tag format: '${SANITIZED}'. Expected vX.Y.Z" >&2
              exit 1
            fi
            printf 'name=%s\n' "${SANITIZED}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            VERSION=$(node -p "require('./package.json').version")
            printf 'name=v%s\n' "${VERSION}" >> "$GITHUB_OUTPUT"
          else
            # REF_NAME comes from a trusted git ref (push/tag event); still strip
            # control characters as a defence-in-depth measure.
            SAFE_REF=$(printf '%s' "${REF_NAME}" | tr -d '\r\n')
            printf 'name=%s\n' "${SAFE_REF}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create extension ZIP
        run: |
          zip -r googo-chat-line-break-key-${{ steps.tag.outputs.name }}.zip \
            manifest.json \
            src/ \
            icons/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@c062e08bd532815e2082a7e09ce9571a6d1144cd # v2.2.1
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          files: googo-chat-line-break-key-${{ steps.tag.outputs.name }}.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
